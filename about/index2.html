<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇宙无敌美富婆 - 妍总</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #ff006e;
            --secondary-color: #8338ec;
            --accent-color: #3a86ff;
            --gold-color: #ffd700;
            --bg-dark: #0a0a0a;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态背景粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .crown {
            font-size: 5rem;
            animation: bounce 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px var(--gold-color));
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .main-title {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold-color), #ff6b6b, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            margin-top: 20px;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5)); }
            to { filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.8)); }
        }

        /* 主要内容卡片 */
        .content-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 文本样式 */
        .text-section {
            margin: 30px 0;
        }

        .highlight-text {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            line-height: 1.6;
            color: var(--text-light);
        }

        .highlight-text .name {
            background: linear-gradient(135deg, #ff006e, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            animation: pulse 2s ease-in-out infinite;
            display: inline-block;
        }

        .highlight-text .title {
            background: linear-gradient(135deg, var(--gold-color), #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            font-size: 1.2em;
            animation: shine 3s linear infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shine {
            0% { filter: brightness(1) drop-shadow(0 0 10px var(--gold-color)); }
            50% { filter: brightness(1.3) drop-shadow(0 0 30px var(--gold-color)); }
            100% { filter: brightness(1) drop-shadow(0 0 10px var(--gold-color)); }
        }

        /* 装饰元素 */
        .decorations {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .deco-item {
            font-size: 3rem;
            animation: rotate 4s linear infinite;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }

        .deco-item:nth-child(2) {
            animation-direction: reverse;
            animation-duration: 3s;
        }

        .deco-item:nth-child(3) {
            animation-duration: 5s;
        }

        @keyframes rotate {
            from { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            to { transform: rotate(360deg) scale(1); }
        }

        /* 按钮 */
        .cta-button {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cta-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(255, 0, 110, 0.6);
        }

        .cta-button:active {
            transform: translateY(-2px) scale(1.02);
        }

        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff, #ff006e);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .content-card {
                padding: 30px;
                margin: 0 10px;
            }

            .highlight-text {
                font-size: clamp(1.2rem, 3vw, 2rem);
            }

            .decorations {
                gap: 20px;
            }

            .deco-item {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: clamp(1.5rem, 4vw, 3rem);
            }

            .crown {
                font-size: 3rem;
            }

            .cta-button {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }

        /* 特殊效果 */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--gold-color);
            border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-text {
            font-size: 2rem;
            color: var(--gold-color);
            animation: loadingPulse 1.5s ease-in-out infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-text">✨ 加载中...</div>
    </div>

    <!-- 背景动画 -->
    <div class="bg-animation"></div>

    <!-- 动态粒子背景 -->
    <div class="particles" id="particles"></div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 标题区域 -->
        <div class="header">
            <div class="crown">👑</div>
            <h1 class="main-title">宇宙无敌美富婆</h1>
        </div>

        <!-- 主要内容卡片 -->
        <div class="content-card">
            <div class="text-section">
                <p class="highlight-text">
                    <span class="name">小贝贝</span>和
                    <span class="name">田阳阳</span>是
                    <span class="title">大傻子</span>，
                    <span class="title">妍总</span>是
                    <span class="title">宇宙无敌美富婆</span>
                </p>
            </div>

            <!-- 装饰元素 -->
            <div class="decorations">
                <div class="deco-item">💎</div>
                <div class="deco-item">✨</div>
                <div class="deco-item">👑</div>
            </div>

            <!-- 互动按钮 -->
            <button class="cta-button" id="magicButton">点击见证奇迹</button>
        </div>
    </div>

    <script>
        // 创建动态粒子
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // 创建闪烁效果
        function createSparkles() {
            const container = document.querySelector('.container');
            const sparkleCount = 20;

            for (let i = 0; i < sparkleCount; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(sparkle);
            }
        }

        // 按钮点击效果
        function setupButtonEffects() {
            const button = document.getElementById('magicButton');
            
            button.addEventListener('click', function() {
                // 创建爆炸效果
                createExplosion();
                
                // 按钮动画
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 100);
            });
        }

        // 爆炸效果
        function createExplosion() {
            const card = document.querySelector('.content-card');
            const rect = card.getBoundingClientRect();
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'fixed';
                particle.style.width = '8px';
                particle.style.height = '8px';
                particle.style.background = `hsl(${Math.random() * 360}, 80%, 60%)`;
                particle.style.borderRadius = '50%';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '9999';
                
                const startX = rect.left + rect.width / 2;
                const startY = rect.top + rect.height / 2;
                
                particle.style.left = startX + 'px';
                particle.style.top = startY + 'px';
                
                document.body.appendChild(particle);
                
                // 动画
                const angle = (Math.PI * 2 * i) / 30;
                const distance = Math.random() * 200 + 100;
                const duration = Math.random() * 1000 + 500;
                
                particle.animate([
                    {
                        transform: 'translate(0, 0) scale(1)',
                        opacity: 1
                    },
                    {
                        transform: `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) scale(0)`,
                        opacity: 0
                    }
                ], {
                    duration: duration,
                    easing: 'ease-out'
                }).onfinish = () => {
                    particle.remove();
                };
            }
        }

        // 文本打字机效果
        function typewriterEffect() {
            const text = document.querySelector('.highlight-text');
            const originalHTML = text.innerHTML;
            text.innerHTML = '';
            
            let i = 0;
            const speed = 50;
            
            function typeWriter() {
                if (i < originalHTML.length) {
                    text.innerHTML = originalHTML.substring(0, i + 1);
                    i++;
                    setTimeout(typeWriter, speed);
                }
            }
            
            setTimeout(typeWriter, 1000);
        }

        // 页面加载完成后的初始化
        window.addEventListener('load', function() {
            // 隐藏加载动画
            setTimeout(() => {
                const loadingOverlay = document.getElementById('loadingOverlay');
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 500);
            }, 1500);

            // 初始化效果
            createParticles();
            createSparkles();
            setupButtonEffects();
            typewriterEffect();
        });

        // 鼠标跟随效果
        document.addEventListener('mousemove', function(e) {
            const cursor = document.createElement('div');
            cursor.style.position = 'fixed';
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursor.style.width = '20px';
            cursor.style.height = '20px';
            cursor.style.background = 'rgba(255, 215, 0, 0.3)';
            cursor.style.borderRadius = '50%';
            cursor.style.pointerEvents = 'none';
            cursor.style.zIndex = '9998';
            cursor.style.transform = 'translate(-50%, -50%)';
            cursor.style.animation = 'fadeOut 0.5s ease-out forwards';
            
            document.body.appendChild(cursor);
            
            setTimeout(() => {
                cursor.remove();
            }, 500);
        });

        // 添加淡出动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                to {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(2);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
